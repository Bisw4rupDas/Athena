# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: colosseum
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
    disk:
      name: colosseum-data
      mountPath: /opt/render/project/src
      sizeGB: 1
