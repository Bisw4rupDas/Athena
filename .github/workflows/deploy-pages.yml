name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure API URL for GitHub Pages
        run: |
          API="${{ secrets.API_BASE_URL }}"
          if [ -z "$API" ]; then
            echo "::error::Add repository secret API_BASE_URL (your Vercel app URL, e.g. https://your-app.vercel.app)"
            exit 1
          fi
          echo "window.COLOSSEUM_CONFIG = { API_BASE: '$API' };" > public/config.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
